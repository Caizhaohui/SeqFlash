# cargo-deny configuration.
# Not part of the M0 verification commands; reserved for later milestones.

[graph]
all-features = true

[advisories]
version = 2
# CI will fail on any advisory with a known fix.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Allow the common permissive licenses used by the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
unlicensed = "deny"
copyleft = "warn"
default = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
