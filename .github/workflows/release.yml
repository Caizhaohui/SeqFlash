name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Build + package (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Package portable ZIP
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-portable.ps1 -OutputDirectory ${{ runner.temp }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeqFlash-portable-x86_64
          path: ${{ runner.temp }}/SeqFlash-portable-x86_64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/SeqFlash-portable-x86_64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
